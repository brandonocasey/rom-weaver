<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <title>rom-weaver</title>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181e25"/>
      <stop offset="1" stop-color="#252d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#d9690f" stop-opacity=".24"/>
      <stop offset="1" stop-color="#d9690f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="weave" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M-12 12 12-12M0 48 48 0M36 60 60 36" fill="none" stroke="#f6ecda" stroke-opacity=".035" stroke-width="2"/>
      <path d="m-12 36 24 24M0 0l48 48M36-12l24 24" fill="none" stroke="#4a6d63" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".36"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#weave)"/>
  <circle cx="275" cy="300" r="330" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="64" width="430" height="512" rx="42" fill="#2c323b" stroke="#43505f" stroke-width="2"/>
    <rect x="86" y="86" width="386" height="468" rx="30" fill="#202730" stroke="#181e25" stroke-width="4"/>
    <image href="../src/assets/app/root/logo.svg" x="103" y="103" width="352" height="352"/>
    <rect x="131" y="489" width="296" height="10" rx="5" fill="#181e25"/>
    <rect x="146" y="489" width="42" height="10" rx="5" fill="#d9690f"/>
    <rect x="202" y="489" width="42" height="10" rx="5" fill="#d9690f"/>
    <rect x="258" y="489" width="42" height="10" rx="5" fill="#d9690f"/>
    <rect x="314" y="489" width="42" height="10" rx="5" fill="#d9690f"/>
    <rect x="370" y="489" width="42" height="10" rx="5" fill="#d9690f"/>
  </g>

  <g font-family="Helvetica">
    <rect x="558" y="116" width="214" height="42" rx="21" fill="#d9690f"/>
    <text x="665" y="144" fill="#181e25" font-size="18" font-weight="700" letter-spacing="2" text-anchor="middle">ROM TOOLKIT</text>

    <text x="554" y="253" fill="#f6ecda" font-size="72" font-weight="800" letter-spacing="3">ROM</text>
    <text x="554" y="331" fill="#f6ecda" font-size="72" font-weight="800" letter-spacing="3">WEAVER</text>
    <rect x="558" y="365" width="90" height="8" rx="4" fill="#d9690f"/>
    <rect x="660" y="365" width="54" height="8" rx="4" fill="#4a6d63"/>

    <text x="558" y="430" fill="#fccb90" font-size="28" font-weight="600">Inspect, patch, transform, and preserve</text>
    <text x="558" y="470" fill="#f6ecda" font-size="28">video game ROMs and disc images.</text>

    <text x="558" y="545" fill="#f6ecda" font-size="24" font-weight="700" letter-spacing="1">rom-weaver.com</text>
    <circle cx="875" cy="537" r="5" fill="#d9690f"/>
    <text x="897" y="545" fill="#aeb7c2" font-size="21">Browser + CLI</text>
  </g>
</svg>
