# Static build configuration for the threaded WebAssembly target.
#
# Static flags live here for every threaded-WASM build. The SDK-relative library
# path is injected by mise; Cargo replaces rather than extends configured
# rustflags, so that override must restate this list.
[target.wasm32-wasip1-threads]
rustflags = [
  "-C", "target-feature=+atomics,+bulk-memory,+mutable-globals,+sign-ext,+reference-types,+simd128",
  "-C", "linker-plugin-lto",
  "-C", "link-arg=--export=malloc",
  "-C", "link-arg=--export=free",
  # Threaded WASM requires a fixed shared-memory maximum. Reserve the full wasm32
  # address space; the browser allocation ladder steps down when that fails.
  "-C", "link-arg=--max-memory=4294967296",
]
