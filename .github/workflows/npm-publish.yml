name: Publish npm CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            runner: macos-14
          - package: darwin-x64
            runner: macos-13
          - package: linux-x64-gnu
            runner: ubuntu-24.04
          - package: win32-x64-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes cmake ninja-build pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build native CLI
        run: cargo build --release -p rom-weaver-cli

      - name: Prepare platform package
        run: node scripts/prepare-npm-platform-package.mjs ${{ matrix.package }}

      - name: Publish platform package
        run: npm publish packages/rom-weaver-cli-platforms/${{ matrix.package }} --ignore-scripts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  launcher:
    needs: platform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish launcher package
        run: npm publish --ignore-scripts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
