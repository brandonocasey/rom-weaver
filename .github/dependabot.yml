# Dependency update automation.
#
# Everything in this repo is pinned to an exact version (see .config/mise.toml [tools]
# and the package.json dependency blocks), which is deliberate - reproducible
# wasm builds depend on it - but means nothing drives those pins forward. These
# schedules do.
#
# Grouping is aggressive on purpose: one PR per ecosystem per week reviewed
# properly beats twenty single-crate PRs that get rubber-stamped. Security
# updates are exempt from grouping and open immediately.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # bincode 3.0.0 is not a release. Its entire crate body is
      # `compile_error!("https://xkcd.com/2347/")` - the bincode maintainers
      # burned the 3.x major to stop drive-by "upgrades" off the 1.x line.
      # 2.x is the real successor but drops `Options`/`DefaultOptions` for a
      # config+derive API, and our only consumer is the XDVDFS on-disk layout
      # codec, where a re-encode is a byte-parity risk. Stay on 1.3.3 until
      # that migration is done deliberately.
      - dependency-name: bincode
        versions: ["3.x"]

  # Two npm manifests: the root wrapper (CLI shim + commitlint/lefthook) and
  # the webapp itself. Dependabot needs one entry per lockfile.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-npm:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /packages/rom-weaver-webapp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # React and the toolchain move together often enough that splitting them
      # produces PRs that cannot be merged independently.
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      build-toolchain:
        patterns: ["vite", "vite-plugin-pwa", "@vitejs/*", "vitest", "@vitest/*", "typescript"]
      linting:
        patterns: ["oxlint", "oxfmt", "@biomejs/*", "knip"]
      other-webapp:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
