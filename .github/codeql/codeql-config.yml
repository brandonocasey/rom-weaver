name: rom-weaver CodeQL config

# Rule exclusions for code scanning. Keep this list short and justified - each
# entry is analysis we are choosing not to receive.
query-filters:
  # Wii fixes its AES-CBC IVs in the disc format; randomizing them would make
  # discs unreadable. Only the inlined nod source uses AES here. Exclude this
  # rule, not the source path, so other findings still run. Revisit if
  # first-party code adds crypto.
  - exclude:
      id: rust/hard-coded-cryptographic-value
