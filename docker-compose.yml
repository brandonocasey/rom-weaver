# Start:       docker compose up --build --detach
# Open:        http://localhost:8080
# Custom port: PORT=3000 docker compose up --build --detach
#
# The container serves HTTP on 8080 for an HTTPS reverse proxy. Set HTTPS_PORT
# for standalone TLS; mount the certificate directory as described in the guide.
services:
  webapp:
    build:
      context: .
      dockerfile: packages/rom-weaver-webapp/Dockerfile
    image: rom-weaver-webapp
    ports:
      - "${HTTPS_PORT:-${PORT:-8080}}:8080"
    environment:
      HTTPS_CERT: "${HTTPS_CERT:-/certs/fullchain.pem}"
      HTTPS_KEY: "${HTTPS_KEY:-/certs/privkey.pem}"
      HTTPS_PORT: "${HTTPS_PORT:-}"
    volumes:
      - "${HTTPS_CERT_DIR:-./certs}:/certs:ro"
    command:
      - /bin/sh
      - -c
      - |
          if [ -n "$$HTTPS_PORT" ]; then
            exec static-web-server \
              --config-file /etc/sws.toml \
              --port 8080 \
              --http2=true \
              --http2-tls-cert "$$HTTPS_CERT" \
              --http2-tls-key "$$HTTPS_KEY"
          fi
          exec static-web-server --config-file /etc/sws.toml
    restart: unless-stopped
