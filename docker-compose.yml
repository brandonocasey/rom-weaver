# Start:       docker compose up --build --detach
# Open:        http://localhost:8080
# Custom port: PORT=3000 docker compose up --build --detach
#
# The container serves HTTP on 8080 for an HTTPS reverse proxy. For standalone TLS, mount a
# certificate and key and set the SERVER_HTTP2_TLS variables.
services:
  webapp:
    build:
      context: .
      dockerfile: packages/rom-weaver-webapp/Dockerfile
    image: rom-weaver-webapp
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
